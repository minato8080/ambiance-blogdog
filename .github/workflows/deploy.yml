name: Deploy

on:
  push:
    branches:
      - master

env:
  PROJECT_ID: ambiance-blogdog
  REGION: asia-northeast1
  REGISTRY: asia-northeast1-docker.pkg.dev/ambiance-blogdog/blogdog

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        run: |
          docker build --target api -t ${{ env.REGISTRY }}/api:${{ github.sha }} -t ${{ env.REGISTRY }}/api:latest .
          docker push ${{ env.REGISTRY }}/api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/api:latest

      - name: Build and push crawler image
        run: |
          docker build --target crawler -t ${{ env.REGISTRY }}/crawler:${{ github.sha }} -t ${{ env.REGISTRY }}/crawler:latest .
          docker push ${{ env.REGISTRY }}/crawler:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/crawler:latest

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy blogdog-api \
            --image=${{ env.REGISTRY }}/api:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --project=${{ env.PROJECT_ID }}

      - name: Update crawler Cloud Run Jobs
        run: |
          for phase in discovery indexer syncer historical recent; do
            gcloud run jobs update blogdog-crawler-${phase} \
              --image=${{ env.REGISTRY }}/crawler:${{ github.sha }} \
              --region=${{ env.REGION }} \
              --project=${{ env.PROJECT_ID }}
          done

      - name: Set API URL in config.js
        run: |
          API_URL=$(gcloud run services describe blogdog-api \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format="value(status.url)")
          echo "const API_BASE_URL = \"${API_URL}\";" > public/config.js

      - name: Deploy Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project=ambiance-blogdog --non-interactive
