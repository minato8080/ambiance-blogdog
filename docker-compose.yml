services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: blogdog
      POSTGRES_USER: blogdog
      POSTGRES_PASSWORD: blogdog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blogdog"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: ["/api"]
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://blogdog:blogdog@db:5432/blogdog?sslmode=disable
      PORT: "8080"
    ports:
      - "8080:8080"

  crawler:
    build: .
    command: ["/crawler"]
    depends_on:
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://blogdog:blogdog@db:5432/blogdog?sslmode=disable

volumes:
  pgdata:
